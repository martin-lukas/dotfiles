# --- General ---
set -g mouse on                  # enable mouse support (click panes, scroll, resize)
set -g history-limit 10000       # scrollback buffer size
set -g base-index 1              # start window numbering at 1 (easier to reach on keyboard)
setw -g pane-base-index 1
set -g escape-time 0             # remove escape key delay for instant pane switching
set -g copy-command "pbcopy"

# --- Vi mode ---
set -g mode-keys vi              # use vim keys in copy mode and search (/, n, N, v, y, etc.)

# --- Appearance ---
set -g default-terminal "screen-256color"   # enable 256 color support inside tmux

# --- Pane navigation ---
bind -n M-Up select-pane -U          # Alt + Up to select pane above
bind -n M-Down select-pane -D        # Alt + Down to select pane below
bind -n M-Left select-pane -L        # Alt + Left to select pane left
bind -n M-Right select-pane -R       # Alt + Right to select pane right
