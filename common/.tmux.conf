# --- General ---
set -g prefix C-b
bind-key C-b send-prefix         # Pressing C-b twice sends C-b to the inner session
set -g mouse on                  # enable mouse support (click panes, scroll, resize)
set -g history-limit 10000       # scrollback buffer size
set -g base-index 1              # start window numbering at 1 (easier to reach on keyboard)
setw -g pane-base-index 1
set -g escape-time 0             # remove escape key delay for instant pane switching
set -g copy-command "pbcopy"
# Correct copying behavior:
# - don't jump to the bottom after copy
# - don't add whitespace after lines
# - use system clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "sed 's/[[:space:]]*$//' | pbcopy"
bind -Tcopy-mode-vi WheelUpPane send -N1 -X scroll-up
bind -Tcopy-mode-vi WheelDownPane send -N1 -X scroll-down
bind -n C-z run-shell true       # Prevent Ctrl-Z from freezing shell in tmux

# Open new windows/panes in same dir
bind-key c new-window -c "#{pane_current_path}"
bind-key '%' split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# --- Vi mode ---
set -g mode-keys vi              # use vim keys in copy mode and search (/, n, N, v, y, etc.)

# --- Appearance ---
set -g default-terminal "tmux-256color"     # enable 256 color support inside tmux

# --- Pane navigation ---
bind -n M-Up select-pane -U          # Alt + Up to select pane above
bind -n M-Down select-pane -D        # Alt + Down to select pane below
bind -n M-Left select-pane -L        # Alt + Left to select pane left
bind -n M-Right select-pane -R       # Alt + Right to select pane right
